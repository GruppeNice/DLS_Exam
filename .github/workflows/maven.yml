name: Java CI with Maven

on:
  push:
    branches: [ "main", "tests" ]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-service
            pom: services/user-service/pom.xml
          - name: review-rating-service
            pom: services/review-rating-service/pom.xml
          - name: engagement-service
            pom: services/engagement-service/pom.xml
          - name: billing-service
            pom: services/billing-service/pom.xml
          - name: catalog-service
            pom: services/catalog-service/pom.xml
          - name: streaming-service
            pom: services/streaming-service/pom.xml

    name: Test ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn -B -f ${{ matrix.pom }} verify

  build:
    name: Analysis
    runs-on: ubuntu-latest
    needs: test-services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Sonar connection and analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B -DskipTests install org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=GruppeNice_DLS_Exam
          -Dsonar.organization=gruppenice
          -Dsonar.host.url=https://sonarcloud.io