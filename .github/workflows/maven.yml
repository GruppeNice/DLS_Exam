name: Java CI with Maven

on:
  push:
    branches: [ "main", "tests" ]

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-service
            pom: services/user-service/pom.xml
          - name: review-rating-service
            pom: services/review-rating-service/pom.xml
          - name: engagement-service
            pom: services/engagement-service/pom.xml
          - name: billing-service
            pom: services/billing-service/pom.xml
          - name: catalog-service
            pom: services/catalog-service/pom.xml

    name: Test ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn -B -f ${{ matrix.pom }} verify

  dependency-graph:
    runs-on: ubuntu-latest
    needs: test-services
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
