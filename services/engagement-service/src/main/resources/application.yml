server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: engagement-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3312/engagement_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:engagement_user}
    password: ${DB_PASSWORD:engagement_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

notification:
  mail:
    from: ${SPRING_MAIL_FROM:noreply@dls.local}

app:
  messaging:
    billing-exchange: ${BILLING_EVENTS_EXCHANGE:billing.events}
    streaming-exchange: ${STREAMING_EVENTS_EXCHANGE:streaming.events}
    catalog-exchange: ${CATALOG_EVENTS_EXCHANGE:catalog.events}
    review-exchange: ${REVIEW_EVENTS_EXCHANGE:review.events}
  engagement:
    mode: ${ENGAGEMENT_MODE:server}
    demo-user-id: ${DEMO_USER_ID:dddddddd-dddd-dddd-dddd-ddddddddddd1}
    demo-user-email: ${DEMO_USER_EMAIL:demo@dls.local}
    broadcast-recipient: ${ENGAGEMENT_BROADCAST_EMAIL:demo@dls.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

---
spring:
  config:
    activate:
      on-property:
        name: app.engagement.mode
        having-value: job
  main:
    web-application-type: none
