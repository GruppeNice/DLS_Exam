spring.application.name=rating-and-review-service

server.port=${SERVER_PORT:8085}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3311/review_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:review_user}
spring.datasource.password=${DB_PASSWORD:review_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:seed.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
