spring:
  datasource:
    url: jdbc:h2:mem:reviewtest;MODE=MySQL;NON_KEYWORDS=VALUE,GROUP,TYPE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        type:
          preferred_uuid_jdbc_type: VARCHAR
  flyway:
    enabled: false

app:
  messaging:
    exchange: review.events

