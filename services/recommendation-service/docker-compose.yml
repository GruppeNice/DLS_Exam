services:
  recommendation-service-db:
    image: postgres:16
    container_name: recommendation-service-db
    environment:
      POSTGRES_DB: recommendation_db
      POSTGRES_USER: recommendation_user
      POSTGRES_PASSWORD: recommendation_password
    ports:
      - "5435:5432"
    volumes:
      - recommendation_service_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommendation_user -d recommendation_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  recommendation-service-rabbitmq:
    image: rabbitmq:3-management
    container_name: recommendation-service-rabbitmq
    ports:
      - "5675:5672"
      - "15675:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  recommendation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation-service
    environment:
      SERVER_PORT: 8090
      DATABASE_URL: postgresql+psycopg2://recommendation_user:recommendation_password@recommendation-service-db:5432/recommendation_db
      RABBITMQ_HOST: recommendation-service-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      STREAMING_EVENTS_EXCHANGE: streaming.events
      BILLING_EVENTS_EXCHANGE: billing.events
      REVIEW_EVENTS_EXCHANGE: review.events
      JWT_SECRET_BASE64: VGVzdGluZ0Rldk9ubHlTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==
      MODEL_RETRAIN_INTERVAL_MINUTES: 30
      RECOMMENDATION_LIST_SIZE: 10
    ports:
      - "8090:8090"
    depends_on:
      recommendation-service-db:
        condition: service_healthy
      recommendation-service-rabbitmq:
        condition: service_healthy

volumes:
  recommendation_service_db_data:
