resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/user/ {
        set $upstream_user user-service:8081;
        proxy_pass http://$upstream_user/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/catalog/ {
        set $upstream_catalog catalog-service:8082;
        proxy_pass http://$upstream_catalog/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/streaming/ {
        set $upstream_streaming streaming-service:8083;
        proxy_pass http://$upstream_streaming/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/billing/ {
        set $upstream_billing billing-service:8084;
        proxy_pass http://$upstream_billing/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/review/ {
        set $upstream_review review-rating-service:8085;
        proxy_pass http://$upstream_review/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/engagement/ {
        set $upstream_engagement engagement-service:8086;
        proxy_pass http://$upstream_engagement/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/recommendation/ {
        set $upstream_recommendation recommendation-service:8090;
        proxy_pass http://$upstream_recommendation/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
