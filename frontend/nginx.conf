resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # set must run before rewrite ... break (otherwise the upstream variable stays empty).
    location /api/user/ {
        set $upstream http://user-service:8081;
        rewrite ^/api/user/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/catalog/ {
        set $upstream http://catalog-service:8082;
        rewrite ^/api/catalog/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/streaming/ {
        set $upstream http://streaming-service:8083;
        rewrite ^/api/streaming/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/billing/ {
        set $upstream http://billing-service:8084;
        rewrite ^/api/billing/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/review/ {
        set $upstream http://review-rating-service:8085;
        rewrite ^/api/review/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/engagement/ {
        set $upstream http://engagement-service:8086;
        rewrite ^/api/engagement/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/recommendation/ {
        set $upstream http://recommendation-service:8090;
        rewrite ^/api/recommendation/?(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
