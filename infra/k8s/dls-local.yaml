apiVersion: v1
kind: Secret
metadata:
  name: dls-secrets
type: Opaque
stringData:
  JWT_SECRET_BASE64: VGVzdGluZ0Rldk9ubHlTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==
  USER_DB_PASSWORD: user_password
  BILLING_DB_PASSWORD: billing_password
  STREAMING_DB_PASSWORD: streaming_password
  RECOMMENDATION_DB_PASSWORD: recommendation_password
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672

---
apiVersion: v1
kind: Service
metadata:
  name: user-service-db
spec:
  selector:
    app: user-service-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service-db
  template:
    metadata:
      labels:
        app: user-service-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: user_db
            - name: POSTGRES_USER
              value: user_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: USER_DB_PASSWORD
          volumeMounts:
            - name: user-service-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: user-service-db-data
          emptyDir: {}

