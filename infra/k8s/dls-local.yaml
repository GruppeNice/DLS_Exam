---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
  type: NodePort

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: dls/user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: JWT_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: JWT_SECRET_BASE64
            - name: SERVER_PORT
              value: "8081"
            - name: DB_URL
              value: jdbc:postgresql://user-service-db:5432/user_db
            - name: DB_USERNAME
              value: user_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: USER_DB_PASSWORD
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: RABBITMQ_PASSWORD
            - name: USER_EVENTS_EXCHANGE
              value: user.events

            - name: JWT_EXPIRATION_SECONDS
              value: "3600"

---
