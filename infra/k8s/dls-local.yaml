apiVersion: v1
kind: Secret
metadata:
  name: dls-secrets
type: Opaque
stringData:
  JWT_SECRET_BASE64: VGVzdGluZ0Rldk9ubHlTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==
  MYSQL_ROOT_PASSWORD: root_password
  USER_DB_PASSWORD: user_password
  BILLING_DB_PASSWORD: billing_password
  STREAMING_DB_PASSWORD: streaming_password
  RECOMMENDATION_DB_PASSWORD: recommendation_password
  CATALOG_DB_PASSWORD: catalog_password
  REVIEW_DB_PASSWORD: review_password
  ENGAGEMENT_DB_PASSWORD: engagement_password
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672

---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http
      port: 8025
      targetPort: 8025
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog
          ports:
            - containerPort: 1025
            - containerPort: 8025

---
apiVersion: v1
kind: Service
metadata:
  name: user-service-db
spec:
  selector:
    app: user-service-db
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service-db
  template:
    metadata:
      labels:
        app: user-service-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: user_db
            - name: MYSQL_USER
              value: user_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: USER_DB_PASSWORD
          volumeMounts:
            - name: user-service-db-data
              mountPath: /var/lib/mysql
      volumes:
        - name: user-service-db-data
          emptyDir: {}

