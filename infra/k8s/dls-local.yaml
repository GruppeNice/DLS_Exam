---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
spec:
  selector:
    app: recommendation-service
  ports:
    - port: 8090
      targetPort: 8090
  type: NodePort

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: dls/recommendation-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: JWT_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: JWT_SECRET_BASE64
            - name: SERVER_PORT
              value: "8090"
            - name: DATABASE_URL
              value: postgresql+psycopg2://recommendation_user:recommendation_password@recommendation-service-db:5432/recommendation_db
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dls-secrets
                  key: RABBITMQ_PASSWORD
            - name: STREAMING_EVENTS_EXCHANGE
              value: streaming.events
            - name: BILLING_EVENTS_EXCHANGE
              value: billing.events
            - name: REVIEW_EVENTS_EXCHANGE
              value: review.events
            - name: MODEL_RETRAIN_INTERVAL_MINUTES
              value: "30"
            - name: RECOMMENDATION_LIST_SIZE
              value: "10"