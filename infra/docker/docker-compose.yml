x-healthcheck-postgres: &healthcheck-postgres
  interval: 5s
  timeout: 5s
  retries: 10

x-healthcheck-rabbitmq: &healthcheck-rabbitmq
  interval: 10s
  timeout: 5s
  retries: 10

x-jwt-secret: &jwt-secret
  JWT_SECRET_BASE64: VGVzdGluZ0Rldk9ubHlTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: dls-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      <<: *healthcheck-rabbitmq
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]

  user-service-db:
    image: postgres:16
    container_name: user-service-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_password
    ports:
      - "5432:5432"
    volumes:
      - user_service_db_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-postgres
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]

  billing-service-db:
    image: postgres:16
    container_name: billing-service-db
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_password
    ports:
      - "5433:5432"
    volumes:
      - billing_service_db_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-postgres
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]

  streaming-service-db:
    image: postgres:16
    container_name: streaming-service-db
    environment:
      POSTGRES_DB: streaming_db
      POSTGRES_USER: streaming_user
      POSTGRES_PASSWORD: streaming_password
    ports:
      - "5434:5432"
    volumes:
      - streaming_service_db_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-postgres
      test: ["CMD-SHELL", "pg_isready -U streaming_user -d streaming_db"]

  recommendation-service-db:
    image: postgres:16
    container_name: recommendation-service-db
    environment:
      POSTGRES_DB: recommendation_db
      POSTGRES_USER: recommendation_user
      POSTGRES_PASSWORD: recommendation_password
    ports:
      - "5435:5432"
    volumes:
      - recommendation_service_db_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-postgres
      test: ["CMD-SHELL", "pg_isready -U recommendation_user -d recommendation_db"]

  user-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/user-service
        SERVICE_ARTIFACT: user-service
        SERVICE_PORT: 8081
    container_name: user-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://user-service-db:5432/user_db
      DB_USERNAME: user_user
      DB_PASSWORD: user_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      USER_EVENTS_EXCHANGE: user.events
      JWT_EXPIRATION_SECONDS: 3600
    ports:
      - "8081:8081"
    depends_on:
      user-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  billing-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/billing-service
        SERVICE_ARTIFACT: billing-service
        SERVICE_PORT: 8084
    container_name: billing-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://billing-service-db:5432/billing_db
      DB_USERNAME: billing_user
      DB_PASSWORD: billing_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      BILLING_EVENTS_EXCHANGE: billing.events
      PAYMENT_SIMULATED_FAILURE_RATE: 0.0
    ports:
      - "8084:8084"
    depends_on:
      billing-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  streaming-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/streaming-service
        SERVICE_ARTIFACT: streaming-service
        SERVICE_PORT: 8083
    container_name: streaming-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://streaming-service-db:5432/streaming_db
      DB_USERNAME: streaming_user
      DB_PASSWORD: streaming_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      STREAMING_EVENTS_EXCHANGE: streaming.events
      BILLING_SERVICE_BASE_URL: http://billing-service:8084
      DRM_SIMULATED_FAILURE_RATE: 0.0
    ports:
      - "8083:8083"
    depends_on:
      streaming-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      billing-service:
        condition: service_started

  recommendation-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/recommendation-service
        SERVICE_PORT: 8090
    container_name: recommendation-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8090
      DATABASE_URL: postgresql+psycopg2://recommendation_user:recommendation_password@recommendation-service-db:5432/recommendation_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      STREAMING_EVENTS_EXCHANGE: streaming.events
      BILLING_EVENTS_EXCHANGE: billing.events
      REVIEW_EVENTS_EXCHANGE: review.events
      MODEL_RETRAIN_INTERVAL_MINUTES: 30
      RECOMMENDATION_LIST_SIZE: 10
    ports:
      - "8090:8090"
    depends_on:
      recommendation-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  user_service_db_data:
  billing_service_db_data:
  streaming_service_db_data:
  recommendation_service_db_data:
