x-healthcheck-mysql: &healthcheck-mysql
  interval: 5s
  timeout: 5s
  retries: 15

x-healthcheck-rabbitmq: &healthcheck-rabbitmq
  interval: 10s
  timeout: 5s
  retries: 10

x-jwt-secret: &jwt-secret
  JWT_SECRET_BASE64: VGVzdGluZ0Rldk9ubHlTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==

x-mysql-root-password: &mysql-root-password
  MYSQL_ROOT_PASSWORD: root_password

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: dls-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      <<: *healthcheck-rabbitmq
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]

  mailhog:
    image: mailhog/mailhog
    container_name: dls-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  user-service-db:
    image: mysql:8.4
    container_name: user-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - user_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  billing-service-db:
    image: mysql:8.4
    container_name: billing-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: billing_db
      MYSQL_USER: billing_user
      MYSQL_PASSWORD: billing_password
    ports:
      - "3307:3306"
    volumes:
      - billing_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  streaming-service-db:
    image: mysql:8.4
    container_name: streaming-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: streaming_db
      MYSQL_USER: streaming_user
      MYSQL_PASSWORD: streaming_password
    ports:
      - "3308:3306"
    volumes:
      - streaming_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  recommendation-service-db:
    image: mysql:8.4
    container_name: recommendation-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: recommendation_db
      MYSQL_USER: recommendation_user
      MYSQL_PASSWORD: recommendation_password
    ports:
      - "3309:3306"
    volumes:
      - recommendation_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  catalog-service-db:
    image: mysql:8.4
    container_name: catalog-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: catalog_db
      MYSQL_USER: catalog_user
      MYSQL_PASSWORD: catalog_password
    ports:
      - "3310:3306"
    volumes:
      - catalog_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  review-rating-service-db:
    image: mysql:8.4
    container_name: review-rating-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: review_db
      MYSQL_USER: review_user
      MYSQL_PASSWORD: review_password
    ports:
      - "3311:3306"
    volumes:
      - review_rating_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  engagement-service-db:
    image: mysql:8.4
    container_name: engagement-service-db
    environment:
      <<: *mysql-root-password
      MYSQL_DATABASE: engagement_db
      MYSQL_USER: engagement_user
      MYSQL_PASSWORD: engagement_password
    ports:
      - "3312:3306"
    volumes:
      - engagement_service_db_data:/var/lib/mysql
    healthcheck:
      <<: *healthcheck-mysql
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]

  user-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/user-service
        SERVICE_ARTIFACT: user-service
        SERVICE_PORT: 8081
    container_name: user-service
    restart: unless-stopped
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://user-service-db:3306/user_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: user_user
      DB_PASSWORD: user_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      USER_EVENTS_EXCHANGE: user.events
      JWT_EXPIRATION_SECONDS: 3600
    ports:
      - "8081:8081"
    depends_on:
      user-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  billing-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/billing-service
        SERVICE_ARTIFACT: billing-service
        SERVICE_PORT: 8084
    container_name: billing-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8084
      DB_URL: jdbc:mysql://billing-service-db:3306/billing_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: billing_user
      DB_PASSWORD: billing_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      BILLING_EVENTS_EXCHANGE: billing.events
      PAYMENT_SIMULATED_FAILURE_RATE: 0.0
    ports:
      - "8084:8084"
    depends_on:
      billing-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  streaming-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/streaming-service
        SERVICE_ARTIFACT: streaming-service
        SERVICE_PORT: 8083
    container_name: streaming-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8083
      DB_URL: jdbc:mysql://streaming-service-db:3306/streaming_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: streaming_user
      DB_PASSWORD: streaming_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      STREAMING_EVENTS_EXCHANGE: streaming.events
      BILLING_SERVICE_BASE_URL: http://billing-service:8084
      DRM_SIMULATED_FAILURE_RATE: 0.0
    ports:
      - "8083:8083"
    depends_on:
      streaming-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      billing-service:
        condition: service_started

  recommendation-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python-service
      args:
        SERVICE_PATH: services/recommendation-service
        SERVICE_PORT: 8090
    container_name: recommendation-service
    restart: unless-stopped
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8090
      DATABASE_URL: mysql+pymysql://recommendation_user:recommendation_password@recommendation-service-db:3306/recommendation_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      STREAMING_EVENTS_EXCHANGE: streaming.events
      BILLING_EVENTS_EXCHANGE: billing.events
      REVIEW_EVENTS_EXCHANGE: review.events
      MODEL_RETRAIN_INTERVAL_MINUTES: 30
      RECOMMENDATION_LIST_SIZE: 10
    ports:
      - "8090:8090"
    depends_on:
      recommendation-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.spring-service
      args:
        SERVICE_MODULE: services/catalog-service
        SERVICE_ARTIFACT: catalog-service
        SERVICE_PORT: 8082
    container_name: catalog-service
    environment:
      <<: *jwt-secret
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://catalog-service-db:3306/catalog_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: catalog_user
      DB_PASSWORD: catalog_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CATALOG_EVENTS_EXCHANGE: catalog.events
      REVIEW_EVENTS_EXCHANGE: review.events
    ports:
      - "8082:8082"
    depends_on:
      catalog-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  review-rating-service:
    build:
      context: ../../services/review-rating-service
      dockerfile: Dockerfile
    container_name: review-rating-service
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:mysql://review-rating-service-db:3306/review_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: review_user
      DB_PASSWORD: review_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      REVIEW_EVENTS_EXCHANGE: review.events
    ports:
      - "8085:8085"
    depends_on:
      review-rating-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  engagement-service:
    build:
      context: ../../services/engagement-service
      dockerfile: Dockerfile
    container_name: engagement-service
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:mysql://engagement-service-db:3306/engagement_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: engagement_user
      DB_PASSWORD: engagement_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      BILLING_EVENTS_EXCHANGE: billing.events
      STREAMING_EVENTS_EXCHANGE: streaming.events
      CATALOG_EVENTS_EXCHANGE: catalog.events
      DEMO_USER_EMAIL: demo@dls.local
      ENGAGEMENT_BROADCAST_EMAIL: demo@dls.local
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      SPRING_MAIL_FROM: noreply@dls.local
    ports:
      - "8086:8086"
    depends_on:
      engagement-service-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: dls-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      user-service:
        condition: service_started
      catalog-service:
        condition: service_started
      streaming-service:
        condition: service_started
      billing-service:
        condition: service_started
      review-rating-service:
        condition: service_started
      engagement-service:
        condition: service_started
      recommendation-service:
        condition: service_started

volumes:
  user_service_db_data:
  billing_service_db_data:
  streaming_service_db_data:
  recommendation_service_db_data:
  catalog_service_db_data:
  review_rating_service_db_data:
  engagement_service_db_data:
